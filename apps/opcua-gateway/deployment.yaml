apiVersion: apps/v1
kind: Deployment
metadata:
  name: opcua-gateway
  namespace: opcua-system
  labels:
    app: opcua-gateway
    app.kubernetes.io/managed-by: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opcua-gateway
  template:
    metadata:
      labels:
        app: opcua-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: ghcr.io/node-opcua/node-opcua-sample-server:latest
          ports:
            - name: opcua
              containerPort: 4840        # OPC-UA binary (no TLS) — Purdue L2 inbound
              protocol: TCP
            - name: opcua-tls
              containerPort: 4843        # OPC-UA over TLS — preferred
              protocol: TCP
          env:
            - name: OPCUA_PORT
              value: "4840"
            - name: OPCUA_SECURE_PORT
              value: "4843"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 4840
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4840
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: opcua-gateway
  namespace: opcua-system
  labels:
    app: opcua-gateway
spec:
  selector:
    app: opcua-gateway
  ports:
    - name: opcua
      port: 4840
      targetPort: 4840
      protocol: TCP
    - name: opcua-tls
      port: 4843
      targetPort: 4843
      protocol: TCP
  # ClusterIP keeps the service internal — expose via NodePort/ingress only to SCADA VLAN
  type: ClusterIP
