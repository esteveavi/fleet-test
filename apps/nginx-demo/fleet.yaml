defaultNamespace: nginx-demo

# Because we have Chart.yaml, Fleet automatically handles this directory as a local Helm chart
targetCustomizations:
  # Pre-production deployment
  - name: edge-pre
    clusterSelector:
      matchLabels:
        environment: pre
        fleet-environment: edge
    helm:
      valuesFiles:
        - values-pre.yaml

  # Production deployment
  - name: edge-pro
    clusterSelector:
      matchLabels:
        environment: pro
        fleet-environment: edge
    helm:
      valuesFiles:
        - values-pro.yaml
